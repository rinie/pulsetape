; Standalone build for the OOK hardware probe (examples/ook_probe).
; Self-contained — does not pull in the PulseTape src/ tree.
;
;   cd examples/ook_probe
;   pio run -e esp32_lilygo1 -t upload
;   pio device monitor -e esp32_lilygo1 -b 115200
;
; (Or open ook_probe.ino in Arduino IDE and select a TTGO LoRa32 board — e.g.
;  "TTGO LoRa32-OLED" / "TTGO LoRa32 V2.1.6". It MUST define the LORA_* pin
;  macros, so a generic "ESP32 Dev Module" will not compile. Then Upload.)

[platformio]
src_dir = .

[env:esp32_lilygo1]
platform = espressif32@^6.6.0
board = ttgo-lora32-v21new   ; V1.6.1 / V2.1.6 variant — provides LORA_*/OLED_* pin macros
framework = arduino
monitor_speed = 115200
; for the OLED status display (set USE_OLED 0 in the sketch to drop these)
lib_deps =
  adafruit/Adafruit SSD1306
  adafruit/Adafruit GFX Library

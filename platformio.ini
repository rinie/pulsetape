; PlatformIO build (optional second path; Arduino IDE works directly with
; pulsetape.ino). Requires the earlephilhower arduino-pico core, which lives in
; the maxgerhardt raspberrypi platform fork.
;
;   pio run            build
;   pio run -t upload  flash (hold the SenseCAP RP2040 BOOT pinhole first)
;   pio device monitor open serial

[platformio]
; Compile the root sketch plus the layered sources under src/.
src_dir = .

[env:sensecap_rp2040]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico                      ; generic RP2040; SenseCAP is flashed via RPI-BOOT
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
build_flags = -DBOARD_SENSECAP_INDICATOR
build_src_filter = +<pulsetape.ino> +<src/>
